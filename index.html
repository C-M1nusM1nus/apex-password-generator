<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Password Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #6366f1;
      --accent-2: #22c55e;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: var(--card);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
      font-weight: 600;
    }

    .output {
      display: flex;
      gap: 10px;
      margin: 20px 0;
    }

    .output input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1f2937;
      color: var(--text);
      font-size: 16px;
    }

    button {
      padding: 12px 15px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #4f46e5;
    }

    .controls {
      margin-top: 15px;
    }

    .control {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    input[type="range"] {
      width: 100%;
    }

    .strength {
      margin-top: 20px;
    }

    .bar {
      height: 10px;
      border-radius: 10px;
      background: #1f2937;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      transition: 0.3s;
    }

    .label {
      margin-top: 5px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 500px) {
      .container {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Password Generator</h1>

    <div class="output">
      <input id="password" readonly />
      <button onclick="copyPassword()">Copy</button>
    </div>

    <button onclick="generatePassword()" style="width:100%">Generate Password</button>

    <div class="controls">
      <div class="control">
        <label>Length: <span id="lengthVal">12</span></label>
      </div>
      <input type="range" min="6" max="32" value="12" id="length" />

      <div class="control">
        <label><input type="checkbox" id="lower" checked /> Lowercase</label>
      </div>
      <div class="control">
        <label><input type="checkbox" id="upper" checked /> Uppercase</label>
      </div>
      <div class="control">
        <label><input type="checkbox" id="numbers" checked /> Numbers</label>
      </div>
      <div class="control">
        <label><input type="checkbox" id="symbols" /> Symbols</label>
      </div>
    </div>

    <div class="strength">
      <div class="bar">
        <div class="fill" id="strengthFill"></div>
      </div>
      <div class="label" id="strengthLabel">Strength: </div>
    </div>
  </div>

  <script>
    const lower = "abcdefghijklmnopqrstuvwxyz";
    const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const numbers = "0123456789";
    const symbols = "!@#$%^&*()_+[]{}<>?";

    const lengthSlider = document.getElementById("length");
    const lengthVal = document.getElementById("lengthVal");

    lengthSlider.addEventListener("input", () => {
      lengthVal.textContent = lengthSlider.value;
    });

    function generatePassword() {
      let chars = "";
      if (document.getElementById("lower").checked) chars += lower;
      if (document.getElementById("upper").checked) chars += upper;
      if (document.getElementById("numbers").checked) chars += numbers;
      if (document.getElementById("symbols").checked) chars += symbols;

      if (!chars) {
        alert("Select at least one character type!");
        return;
      }

      let password = "";
      for (let i = 0; i < lengthSlider.value; i++) {
        password += chars[Math.floor(Math.random() * chars.length)];
      }

      document.getElementById("password").value = password;
      updateStrength(password, chars);
    }

    function copyPassword() {
      const input = document.getElementById("password");
      input.select();
      document.execCommand("copy");
    }

    function updateStrength(password, chars) {
      let score = 0;

      if (password.length >= 12) score += 1;
      if (password.length >= 16) score += 1;
      if (/[A-Z]/.test(password)) score += 1;
      if (/[0-9]/.test(password)) score += 1;
      if (/[^A-Za-z0-9]/.test(password)) score += 1;

      const fill = document.getElementById("strengthFill");
      const label = document.getElementById("strengthLabel");

      let width = (score / 5) * 100;
      fill.style.width = width + "%";

      if (score <= 2) {
        fill.style.background = "#ef4444";
        label.textContent = "Strength: Weak";
      } else if (score <= 4) {
        fill.style.background = "#f59e0b";
        label.textContent = "Strength: Medium";
      } else {
        fill.style.background = "#22c55e";
        label.textContent = "Strength: Strong";
      }
    }
  </script>
</body>
</html>
