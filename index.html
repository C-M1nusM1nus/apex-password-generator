<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex Password Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020617;
      --card: rgba(15, 23, 42, 0.85);
      --accent: #00f5ff;
      --accent2: #7c3aed;
      --danger: #ff3b3b;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 40px rgba(0, 245, 255, 0.15);
      border: 1px solid rgba(0, 245, 255, 0.2);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 20px;
    }

    .output {
      display: flex;
      gap: 10px;
      margin: 20px 0;
    }

    .output input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(0,245,255,0.2);
      background: #020617;
      color: var(--accent);
      font-size: 16px;
    }

    button {
      padding: 12px 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 600;
      box-shadow: 0 0 15px rgba(0,245,255,0.4);
    }

    button:hover {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 0 25px rgba(0,245,255,0.7);
    }

    .controls {
      margin-top: 15px;
    }

    .control {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      font-size: 14px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    input[type="checkbox"] {
      accent-color: var(--accent);
    }

    .strength {
      margin-top: 20px;
    }

    .bar {
      height: 10px;
      border-radius: 10px;
      background: #020617;
      overflow: hidden;
      border: 1px solid rgba(0,245,255,0.2);
    }

    .fill {
      height: 100%;
      width: 0%;
      transition: 0.3s;
      box-shadow: 0 0 10px currentColor;
    }

    .label {
      margin-top: 5px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 500px) {
      .container {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>APEX GENERATOR</h1>
    <div class="subtitle">Elite Secure Password System</div>

    <div class="output">
      <input id="password" readonly />
      <button onclick="copyPassword()">Copy</button>
    </div>

    <button onclick="generatePassword()" style="width:100%">Generate</button>

    <div class="controls">
      <div class="control">
        <label>Length: <span id="lengthVal">12</span></label>
      </div>
      <input type="range" min="6" max="32" value="12" id="length" />

      <div class="control">
        <label><input type="checkbox" id="lower" checked /> Lowercase</label>
      </div>
      <div class="control">
        <label><input type="checkbox" id="upper" checked /> Uppercase</label>
      </div>
      <div class="control">
        <label><input type="checkbox" id="numbers" checked /> Numbers</label>
      </div>
      <div class="control">
        <label><input type="checkbox" id="symbols" /> Symbols</label>
      </div>
    </div>

    <div class="strength">
      <div class="bar">
        <div class="fill" id="strengthFill"></div>
      </div>
      <div class="label" id="strengthLabel">Strength:</div>
    </div>
  </div>

  <script>
    const lower = "abcdefghijklmnopqrstuvwxyz";
    const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const numbers = "0123456789";
    const symbols = "!@#$%^&*()_+[]{}<>?";

    const lengthSlider = document.getElementById("length");
    const lengthVal = document.getElementById("lengthVal");

    lengthSlider.addEventListener("input", () => {
      lengthVal.textContent = lengthSlider.value;
    });

    function generatePassword() {
      let chars = "";
      if (document.getElementById("lower").checked) chars += lower;
      if (document.getElementById("upper").checked) chars += upper;
      if (document.getElementById("numbers").checked) chars += numbers;
      if (document.getElementById("symbols").checked) chars += symbols;

      if (!chars) {
        alert("Select at least one character type!");
        return;
      }

      let password = "";
      for (let i = 0; i < lengthSlider.value; i++) {
        password += chars[Math.floor(Math.random() * chars.length)];
      }

      document.getElementById("password").value = password;
      updateStrength(password);
    }

    function copyPassword() {
      const input = document.getElementById("password");
      input.select();
      document.execCommand("copy");
    }

    function updateStrength(password) {
      let score = 0;

      if (password.length >= 12) score++;
      if (password.length >= 16) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;

      const fill = document.getElementById("strengthFill");
      const label = document.getElementById("strengthLabel");

      let width = (score / 5) * 100;
      fill.style.width = width + "%";

      if (score <= 2) {
        fill.style.background = "var(--danger)";
        label.textContent = "Strength: Weak";
      } else if (score <= 4) {
        fill.style.background = "#f59e0b";
        label.textContent = "Strength: Medium";
      } else {
        fill.style.background = "var(--accent)";
        label.textContent = "Strength: Apex";
      }
    }
  </script>
</body>
</html>
